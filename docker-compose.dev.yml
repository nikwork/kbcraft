# kbcraft — standalone dev container (VS Code Remote SSH)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d --build
#   docker compose -f docker-compose.dev.yml down
#
# Connect (no credentials required):
#   ssh root@localhost -p 2222
#
# VS Code — add once to ~/.ssh/config, then Remote-SSH → kbcraft-dev:
#   Host kbcraft-dev
#     HostName localhost
#     Port 2222
#     User root
#     StrictHostKeyChecking no
#
# The full project is mounted at /app and installed in editable mode,
# so every source change on the host is immediately visible inside.
#
# S3 (MinIO) — reachable from the host AND from sibling containers.
#   From host:        http://localhost:9000           (API)
#                     http://localhost:9001           (console — minioadmin / minioadmin)
#   From containers:  http://minio:9000               (devcontainer uses this)
#   Bring up just S3: docker compose -f docker-compose.dev.yml up -d minio s3-init
#   The s3-init service auto-creates the default bucket on startup.

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kbcraft-dev
    ports:
      - "2222:22"
    env_file:
      - path: .env
        required: false
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QWEN3_HOST=http://host.docker.internal:11435
      - QWEN3_MODEL=qwen3-embedding:0.6b
      - QWEN3_MAX_TOKENS=32768
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_REGION=us-east-1
    volumes:
      - .:/app                   # full project — editable install from mounted source
      - venv-dev:/app/.venv      # venv lives in a named volume, not the bind mount
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: kbcraft-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"              # S3 API     — host: http://localhost:9000
      - "9001:9001"              # console    — host: http://localhost:9001
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      # Use MinIO's built-in HTTP health probe — does not depend on `mc`
      # alias setup and works identically on every image revision.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # One-shot bootstrap: waits for minio, configures the `mc` alias, and creates
  # the default kbcraft bucket so clients (host or container) have a target
  # ready immediately. Override the bucket name via $S3_BUCKET.
  s3-init:
    image: minio/mc:latest
    container_name: kbcraft-s3-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - S3_BUCKET=${S3_BUCKET:-kbcraft-e2e}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb --ignore-existing local/$$S3_BUCKET) &&
      echo 'bucket ready: '$$S3_BUCKET
      "
    restart: "no"

volumes:
  venv-dev:
    driver: local
  minio-data:
    driver: local
