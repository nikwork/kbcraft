services:

  # ── Ollama server ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: kbcraft-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama      # persist pulled models across restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # GPU support — remove the `deploy` block if you don't have an NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Pull nomic-embed-text once, then exit ─────────────────────────────────
  # Re-runs on `docker compose up` but `ollama pull` is a no-op when the
  # model is already present in the shared volume.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: kbcraft-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "ollama pull nomic-embed-text && echo 'Model ready.'"
    restart: "no"

  # ── kbcraft application ────────────────────────────────────────────────────
  kbcraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbcraft-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434   # used by test scripts
    volumes:
      - ./docs:/app/docs                  # mount local docs folder to index
      - ./scripts:/app/scripts            # mount scripts for easy execution
    stdin_open: true
    tty: true
    # Override CMD to keep container alive for interactive use:
    #   docker compose run kbcraft bash
    command: ["kbcraft", "--help"]

volumes:
  ollama-models:
    driver: local
