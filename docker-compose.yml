services:

  # ── Ollama server (all-minilm) ─────────────────────────────────────────────
  # TODO: pin to a specific version, e.g. ollama/ollama:0.5.0
  # all-minilm: 384 dims, ~22 MB — lightweight CPU-friendly model.
  ollama:
    image: ollama/ollama:latest
    container_name: kbcraft-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama      # persist pulled models across restarts
    entrypoint: >
      sh -c "ollama serve &
             SERVER_PID=$$!;
             until ollama list 2>/dev/null; do sleep 1; done;
             ollama pull all-minilm;
             wait $$SERVER_PID"
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q all-minilm"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Ollama server (qwen3-embedding:0.6b) ───────────────────────────────────
  # qwen3-embedding:0.6b: 1024 dims, ~500 MB — Qwen3 0.6b embedding model.
  qwen3:
    image: ollama/ollama:latest
    container_name: kbcraft-ollama-qwen3
    ports:
      - "11435:11434"
    volumes:
      - ollama-qwen3-models:/root/.ollama      # persist pulled models across restarts
    entrypoint: >
      sh -c "ollama serve &
             SERVER_PID=$$!;
             until ollama list 2>/dev/null; do sleep 1; done;
             ollama pull qwen3-embedding:0.6b;
             wait $$SERVER_PID"
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list | grep -q qwen3-embedding"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── kbcraft application ────────────────────────────────────────────────────
  kbcraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbcraft-app
    depends_on:
      ollama:
        condition: service_healthy
      qwen3:
        condition: service_healthy
    env_file:
      - path: .env
        required: false           # tolerated if .env is absent
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MAX_TOKENS=240        # all-minilm context window is 256; ~10 tokens reserved for File/Path header
      - QWEN3_HOST=http://qwen3:11434
      - QWEN3_MODEL=qwen3-embedding:0.6b
      - QWEN3_MAX_TOKENS=32768   # Qwen3-Embedding-0.6B context window
    volumes:
      - ./configs:/app/configs            # embedding + vector store config
      - ./docs:/app/docs                  # mount local docs folder to index
      - ./scripts:/app/scripts            # mount scripts for easy execution
      - ./src:/app/src                    # source code — available for indexing
      - ./tests:/app/tests                # test suite — available for indexing
      - ./kb:/app/kb                      # knowledge base docs — available for indexing
      - ./vectordb:/app/vectordb          # persist output vector DB files to local folder
    command: ["kbcraft", "--help"]

volumes:
  ollama-models:
    driver: local
  ollama-qwen3-models:
    driver: local
