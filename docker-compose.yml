services:

  # ── Ollama server ──────────────────────────────────────────────────────────
  # TODO: pin to a specific version, e.g. ollama/ollama:0.5.0
  ollama:
    image: ollama/ollama:latest
    container_name: kbcraft-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama      # persist pulled models across restarts
    # Start server, wait until ready, then pull all-minilm (no-op if already present).
    # all-minilm: 384 dims, ~22 MB — lightest CPU-friendly embedding model.
    entrypoint: >
      sh -c "ollama serve &
             SERVER_PID=$$!;
             until ollama list 2>/dev/null; do sleep 1; done;
             ollama pull all-minilm;
             wait $$SERVER_PID"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── kbcraft application ────────────────────────────────────────────────────
  kbcraft:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kbcraft-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./docs:/app/docs                  # mount local docs folder to index
      - ./scripts:/app/scripts            # mount scripts for easy execution
      - ./src:/app/src                    # source code — available for indexing
      - ./tests:/app/tests                # test suite — available for indexing
      - ./kb:/app/kb                      # knowledge base docs — available for indexing
    command: ["kbcraft", "--help"]

volumes:
  ollama-models:
    driver: local
